<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Route-the-PO · Procurement · Procurefy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --surface-2: #FAFBFC;
    --hover: #F0F2F5;
    --line: #DFE1E6;
    --line-2: #E5E7EB;
    --line-3: #EBECF0;

    --ink: #172B4D;
    --ink-2: #344563;
    --ink-3: #5E6C84;
    --ink-4: #97A0AF;
    --ink-5: #C1C7D0;

    --brand: #0F766E;
    --brand-2: #0E635A;
    --brand-soft: #D1ECE6;
    --brand-dim: rgba(15, 118, 110, 0.10);

    --blue: #0052CC;
    --blue-soft: #DEEBFF;

    --amber: #B45309;
    --amber-soft: #FEF3C7;
    --amber-dim: rgba(180, 83, 9, 0.10);

    --rose: #BE123C;
    --rose-soft: #FEE2E2;
    --rose-dim: rgba(190, 18, 60, 0.10);

    --green: #047857;
    --green-soft: #DCFCE7;
    --green-dim: rgba(4, 120, 87, 0.10);

    --status-draft: var(--ink-3);
    --status-pending: var(--amber);
    --status-approved: var(--green);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', -apple-system, system-ui, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01', 'cv11', 'tnum';
    overflow: hidden;
    font-size: 13.5px;
  }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  button { font-family: inherit; }
  a { color: inherit; }

  /* ───────── Top app bar ───────── */
  .appbar {
    height: 48px;
    background: #FFFFFF;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 220px 1fr auto;
    align-items: center;
    padding: 0 16px;
    position: relative;
    z-index: 5;
  }
  .ab-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }
  .ab-logo {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--brand);
    color: #fff;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
  }
  .ab-app-name { letter-spacing: -0.005em; }
  .ab-app-name span { color: var(--ink-3); font-weight: 400; }

  .ab-modules {
    display: flex;
    align-items: stretch;
    height: 48px;
    margin-left: 16px;
  }
  .ab-mod {
    padding: 0 14px;
    display: inline-flex;
    align-items: center;
    color: var(--ink-3);
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .15s;
  }
  .ab-mod:hover { color: var(--ink); }
  .ab-mod.active {
    color: var(--ink);
    font-weight: 600;
    border-bottom-color: var(--brand);
  }
  .ab-mod .ab-mod-count {
    background: var(--brand-dim);
    color: var(--brand);
    font-size: 10.5px;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 6px;
    font-weight: 600;
  }

  .ab-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    height: 30px;
    padding: 0 10px;
    border-radius: 6px;
    color: var(--ink-3);
    font-size: 12.5px;
    width: 220px;
    margin-right: 12px;
  }
  .ab-right {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: end;
  }
  .ab-icon-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--ink-3);
    display: grid; place-items: center;
    transition: background .12s;
    position: relative;
  }
  .ab-icon-btn:hover { background: var(--hover); }
  .ab-notif-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 7px; height: 7px;
    background: var(--rose);
    border-radius: 50%;
    border: 2px solid #fff;
  }
  .ab-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #14B8A6, #0F766E);
    color: white;
    font-weight: 600;
    font-size: 11.5px;
    display: grid; place-items: center;
  }

  /* ───────── Sub bar (breadcrumb + filters) ───────── */
  .subbar {
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-3);
  }
  .breadcrumb b { color: var(--ink); font-weight: 600; }
  .breadcrumb .sep { color: var(--ink-4); margin: 0 2px; }

  .sub-filters {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-chip {
    height: 28px;
    padding: 0 10px;
    border-radius: 14px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink-2);
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .filter-chip:hover { background: var(--hover); }
  .filter-chip.active {
    background: var(--brand-dim);
    border-color: var(--brand);
    color: var(--brand);
    font-weight: 500;
  }
  .filter-chip .ct {
    background: rgba(255,255,255,0.6);
    padding: 1px 6px;
    border-radius: 999px;
    font-size: 10.5px;
  }

  /* ───────── Main grid ───────── */
  .main {
    height: calc(100vh - 48px - 44px);
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    min-height: 0;
    position: relative;
  }

  /* ─── PO list ─── */
  .list {
    border-right: 1px solid var(--line);
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .list-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  .list-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .list-meta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--ink-3);
  }
  .list-col-head {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 10px;
    padding: 8px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .list-col-head input[type="checkbox"] {
    accent-color: var(--brand);
  }
  .list-rows { display: flex; flex-direction: column; }
  .list-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 10px;
    padding: 14px 16px 14px;
    border-bottom: 1px solid var(--line-3);
    cursor: pointer;
    position: relative;
    transition: background .12s;
  }
  .list-row:hover { background: var(--hover); }
  .list-row.selected {
    background: var(--brand-dim);
  }
  .list-row.selected::before {
    content: ""; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--brand);
  }
  .list-row-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--ink-4);
    border-radius: 3px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .list-row.done .list-row-check {
    background: var(--brand);
    border-color: var(--brand);
    color: white;
    display: grid;
    place-items: center;
    font-size: 10px;
  }
  .list-row-id {
    font-family: 'Geist Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .list-row-vendor {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 2px;
  }
  .list-row-meta {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 4px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .list-row-meta-pip {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--ink-5);
  }
  .list-row-amount {
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    font-weight: 600;
    text-align: right;
  }
  .list-row-status {
    margin-top: 4px;
    text-align: right;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge.pending { background: var(--amber-soft); color: var(--amber); }
  .badge.approved { background: var(--green-soft); color: var(--green); }
  .badge.rejected { background: var(--rose-soft); color: var(--rose); }
  .badge.routing { background: var(--blue-soft); color: var(--blue); }

  /* ─── Detail (centre) ─── */
  .detail {
    overflow-y: auto;
    background: var(--bg);
    padding: 20px 24px 32px;
  }
  .detail-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 0 0 18px;
    margin-bottom: 4px;
  }
  .detail-id {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    color: var(--ink-3);
  }
  .detail-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-top: 6px;
    line-height: 1.2;
  }
  .detail-line {
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 4px;
  }
  .detail-actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-2);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--hover); border-color: var(--ink-4); }
  .btn.primary {
    background: var(--brand);
    border-color: var(--brand);
    color: white;
  }
  .btn.primary:hover { background: var(--brand-2); border-color: var(--brand-2); }
  .btn.icon {
    width: 32px; padding: 0;
    justify-content: center;
  }

  /* Detail card sections */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 16px;
  }
  .card-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-head-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .card-head-meta {
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .card-body { padding: 16px; }

  /* Summary card */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .summary-cell {
    padding: 14px 16px;
    border-right: 1px solid var(--line);
  }
  .summary-cell:last-child { border-right: none; }
  .summary-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .summary-val {
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 4px;
    letter-spacing: -0.005em;
  }
  .summary-val.amount {
    font-family: 'Geist Mono', monospace;
  }
  .summary-sub {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .summary-sub.warn { color: var(--amber); }
  .summary-sub.ok { color: var(--green); }
  .summary-sub.bad { color: var(--rose); }

  /* Line items table */
  table.lineitems {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  table.lineitems thead {
    background: var(--surface-2);
  }
  table.lineitems th {
    text-align: left;
    padding: 10px 14px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--line);
  }
  table.lineitems th.num { text-align: right; }
  table.lineitems td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line-3);
    color: var(--ink-2);
    vertical-align: top;
  }
  table.lineitems td.num {
    text-align: right;
    font-family: 'Geist Mono', monospace;
    color: var(--ink);
  }
  table.lineitems tr:last-child td { border-bottom: none; }
  table.lineitems .li-desc { color: var(--ink); font-weight: 500; }
  table.lineitems .li-sub { color: var(--ink-3); font-size: 11.5px; margin-top: 2px; }
  table.lineitems .li-acct {
    font-family: 'Geist Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-3);
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 3px;
    display: inline-block;
  }

  .total-row {
    background: var(--surface-2);
    font-weight: 600;
  }
  .total-row td { padding-top: 14px; padding-bottom: 14px; color: var(--ink); }

  /* Vendor block */
  .vendor {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .vendor-logo {
    width: 48px; height: 48px;
    border-radius: 8px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
  }
  .vendor-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .vendor-meta {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .vendor-tier {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--brand-dim);
    color: var(--brand);
    font-size: 11px;
    font-weight: 600;
  }
  .vendor-tier.bad {
    background: var(--rose-dim);
    color: var(--rose);
  }
  .vendor-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px 24px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line-3);
  }
  .vendor-stat-label {
    font-size: 10.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .vendor-stat-val {
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
    margin-top: 2px;
  }

  /* Approval chain */
  .approval {
    display: flex;
    align-items: center;
    overflow-x: auto;
    padding: 4px 0;
  }
  .approval-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 100px;
    flex-shrink: 0;
    text-align: center;
  }
  .approval-step-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 2px solid var(--line);
    display: grid; place-items: center;
    color: var(--ink-3);
    font-size: 12px;
    font-weight: 600;
  }
  .approval-step.done .approval-step-icon {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .approval-step.active .approval-step-icon {
    background: var(--surface);
    border-color: var(--brand);
    color: var(--brand);
    animation: stepActive 1.5s ease-in-out infinite;
  }
  @keyframes stepActive {
    0%, 100% { box-shadow: 0 0 0 0 rgba(15, 118, 110, 0.4); }
    50% { box-shadow: 0 0 0 5px rgba(15, 118, 110, 0); }
  }
  .approval-step-name {
    font-size: 11.5px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .approval-step-meta {
    font-size: 10.5px;
    color: var(--ink-3);
    font-family: 'Geist Mono', monospace;
  }
  .approval-step.done .approval-step-name,
  .approval-step.active .approval-step-name {
    color: var(--ink);
  }
  .approval-line {
    flex: 1;
    height: 2px;
    background: var(--line);
    margin: 0 -4px;
    min-width: 24px;
    margin-bottom: 26px;
  }
  .approval-step.done + .approval-line { background: var(--green); }
  .approval-step.active + .approval-line { background: linear-gradient(90deg, var(--brand), var(--line)); }

  /* Activity log */
  .activity {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .activity-row {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-3);
    align-items: start;
  }
  .activity-row:last-child { border-bottom: none; }
  .activity-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--ink-3);
    display: grid; place-items: center;
    font-size: 11px;
    margin-top: 1px;
    border: 1px solid var(--line);
  }
  .activity-icon.ok { background: var(--green-soft); color: var(--green); border-color: var(--green-soft); }
  .activity-icon.flag { background: var(--amber-soft); color: var(--amber); border-color: var(--amber-soft); }
  .activity-msg { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
  .activity-msg b { color: var(--ink); font-weight: 600; }
  .activity-time {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-4);
    white-space: nowrap;
  }

  /* ─── Right action panel ─── */
  .right {
    border-left: 1px solid var(--line);
    background: var(--surface-2);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .right-head {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .right-eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .right-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 4px;
    letter-spacing: -0.005em;
  }
  .right-sub {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 4px;
    line-height: 1.45;
  }

  .queues {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .queue {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    color: inherit;
    font-family: inherit;
    transition: border-color .2s, transform .2s, box-shadow .25s, background .2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .queue:hover {
    border-color: var(--brand);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px -12px rgba(15,118,110,0.25);
  }
  .queue:disabled { pointer-events: none; opacity: 0.6; }
  .queue-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .queue-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .queue-icon {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: grid; place-items: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .queue.auto .queue-icon { background: var(--green-soft); color: var(--green); }
  .queue.finance .queue-icon { background: var(--amber-soft); color: var(--amber); }
  .queue.legal .queue-icon { background: var(--rose-soft); color: var(--rose); }
  .queue-sub { font-size: 11.5px; color: var(--ink-3); line-height: 1.45; }
  .queue-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--ink-3);
  }
  .queue-meta-pip {
    display: inline-block;
    padding: 1px 6px;
    background: var(--hover);
    border-radius: 4px;
  }
  .queue.correct-flash {
    border-color: var(--green);
    background: var(--green-soft);
    animation: correctPulse 1.4s ease-out;
  }
  .queue.wrong-flash {
    border-color: var(--rose);
    background: var(--rose-soft);
    animation: shake 0.55s ease;
  }
  @keyframes correctPulse {
    0% { box-shadow: 0 0 0 0 rgba(4,120,87,0.3); }
    70% { box-shadow: 0 0 0 14px rgba(4,120,87,0); }
    100% { box-shadow: 0 0 0 0 rgba(4,120,87,0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15%, 45%, 75% { transform: translateX(-4px); }
    30%, 60%, 90% { transform: translateX(4px); }
  }

  /* Policy reference drawer */
  .drawer {
    border-top: 1px solid var(--line);
    background: var(--surface);
    margin-top: auto;
  }
  .drawer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .drawer-head:hover { background: var(--hover); }
  .drawer-title {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .drawer-title .doc-icon {
    width: 16px; height: 16px;
    border-radius: 3px;
    background: var(--brand-dim);
    color: var(--brand);
    display: grid; place-items: center;
    font-size: 9px;
    font-weight: 700;
  }
  .drawer-toggle {
    font-size: 11px;
    color: var(--ink-3);
    transition: transform .25s;
  }
  .drawer.open .drawer-toggle { transform: rotate(180deg); }
  .drawer-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s cubic-bezier(.2,.7,.2,1);
  }
  .drawer.open .drawer-body { max-height: 540px; }
  .drawer-inner {
    padding: 0 16px 16px;
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.55;
  }
  .drawer-rule {
    padding: 10px 12px;
    border-radius: 6px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    margin-bottom: 6px;
    transition: background .25s, border-color .25s;
  }
  .drawer-rule.matched {
    background: var(--brand-soft);
    border-color: var(--brand);
  }
  .drawer-rule-num {
    display: inline-block;
    background: var(--hover);
    color: var(--ink-3);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 6px;
  }
  .drawer-rule.matched .drawer-rule-num { background: var(--brand); color: white; }
  .drawer-rule code {
    font-family: 'Geist Mono', monospace;
    background: var(--surface);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11.5px;
    border: 1px solid var(--line);
  }
  .drawer-rule-then {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 4px;
    display: block;
  }
  .drawer-rule.matched .drawer-rule-then b {
    color: var(--brand);
    font-weight: 600;
  }

  /* Verdict (after routing) */
  .verdict {
    margin: 8px 14px 14px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 14px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .4s, transform .4s cubic-bezier(.2,.7,.2,1);
  }
  .verdict.show { opacity: 1; transform: translateY(0); }
  .verdict.ok { border-color: #B5E4D6; background: var(--green-soft); }
  .verdict.wrong { border-color: #F5C2C7; background: var(--rose-soft); }
  .verdict-head {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--green);
    margin-bottom: 6px;
  }
  .verdict.wrong .verdict-head { color: var(--rose); }
  .verdict-title {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .verdict-body {
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .verdict-body b { color: var(--ink); font-weight: 600; }
  .verdict-next {
    margin-top: 10px;
    background: var(--ink);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .verdict-next:hover { background: var(--brand); transform: translateX(2px); }

  /* Toast */
  .toast {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--ink);
    color: white;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .35s cubic-bezier(.2,.7,.2,1);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { background: var(--green); }

  /* Results overlay */
  .results {
    position: absolute; inset: 0;
    z-index: 100;
    background: rgba(23, 43, 77, 0.55);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
    opacity: 0; pointer-events: none;
    transition: opacity .35s;
  }
  .results.show { opacity: 1; pointer-events: auto; }
  .results-card {
    background: var(--surface);
    width: 100%;
    max-width: 920px;
    max-height: 88vh;
    overflow-y: auto;
    border-radius: 12px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.4);
    transform: translateY(20px);
    transition: transform .45s cubic-bezier(.2,.7,.2,1);
  }
  .results.show .results-card { transform: translateY(0); }
  .results-head {
    padding: 26px 32px 18px;
    background: linear-gradient(135deg, #0F766E 0%, #047857 100%);
    color: white;
    border-radius: 12px 12px 0 0;
  }
  .results-eyebrow {
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.85;
  }
  .results-title {
    margin-top: 10px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .results-sub {
    margin-top: 8px;
    font-size: 13.5px;
    opacity: 0.9;
    line-height: 1.5;
    max-width: 60ch;
  }
  .results-score {
    padding: 22px 32px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 28px;
    align-items: end;
    border-bottom: 1px solid var(--line);
  }
  .res-score-num {
    font-size: 72px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .res-score-num b { color: var(--brand); }
  .res-meta-row { font-size: 12.5px; color: var(--ink-3); margin-bottom: 4px; display: flex; gap: 12px; }
  .res-meta-row b { color: var(--ink); font-weight: 600; }

  .res-row {
    padding: 20px 32px;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 1fr 1fr 200px;
    gap: 28px;
  }
  .res-poid { font-family: 'Geist Mono', monospace; font-size: 11.5px; color: var(--ink-3); }
  .res-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-top: 4px; }
  .res-amount { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--ink-3); margin-top: 6px; }
  .res-flow-step {
    font-size: 11.5px;
    color: var(--ink-2);
    line-height: 1.5;
    padding: 3px 0;
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .res-flow-step b { color: var(--ink); font-weight: 600; }
  .res-flow-step .yes { color: var(--brand); font-weight: 600; }
  .res-flow-step .no { color: var(--ink-3); }
  .res-decision {
    display: flex; flex-direction: column; gap: 6px;
  }
  .res-tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    align-self: flex-start;
    background: var(--green-soft); color: var(--green);
  }
  .res-tag.wrong { background: var(--rose-soft); color: var(--rose); }
  .res-decision-line { font-size: 12.5px; color: var(--ink-2); }
  .res-decision-line b { color: var(--ink); font-weight: 600; }

  .results-cta {
    padding: 22px 32px 28px;
    display: flex;
    gap: 10px;
  }
  .res-btn {
    height: 36px;
    padding: 0 16px;
    border-radius: 6px;
    background: var(--ink);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .res-btn:hover { background: var(--brand); }
  .res-btn.secondary {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-2);
    text-decoration: none;
    display: inline-flex; align-items: center;
  }
  .res-btn.secondary:hover { background: var(--hover); }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* Reveal */
  .detail-stack {
    opacity: 0;
    animation: cardIn .45s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<div id="app"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
