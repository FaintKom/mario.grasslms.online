<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FinTech B2B Card Onboarding · Mario Becerra</title>
<meta name="description" content="10-minute microlearning · SCORM 1.2-packaged sample. Authored by Mario Becerra as a portfolio artefact."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<script src="scorm.js"></script>
</head>
<body>

<div class="shell">

  <header class="shell-head">
    <div class="shell-brand">
      <div class="mark">m</div>
      <span>FinTech B2B Card Onboarding · sample</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:16.6%"></div></div>
      <div class="progress-step" id="progressStep">1 / 6</div>
    </div>
    <div class="shell-status">
      Mode <span class="mode" id="scormMode">…</span>
    </div>
  </header>

  <main class="shell-body" id="screenHost"></main>

  <nav class="shell-nav">
    <div class="left">
      <button class="btn btn-secondary" id="prevBtn" disabled>← Previous</button>
    </div>
    <div class="center" id="screenLabel">Welcome</div>
    <div class="right">
      <button class="btn btn-primary" id="nextBtn">Next →</button>
    </div>
  </nav>

</div>

<template id="screen-1">
  <section class="screen">
    <p class="eyebrow">Module 1 of 1 · 10 minutes</p>
    <h1 class="screen-title">A 10-min cheat code for SMB card <em>conversations</em></h1>
    <p class="lede">Sales reps lose deals not because the product is wrong but because the conversation is. This module gives you the three things that actually move SMB owners from interest to commitment.</p>

    <h2>By the end of this module, you can</h2>
    <ul class="objectives">
      <li>Identify the top 3 pain points an SMB owner has around payments and expense control.</li>
      <li>Match the card's 4 key value props to those pain points without sounding scripted.</li>
      <li>Handle the 5 most common objections without breaking conversational flow.</li>
    </ul>

    <div class="callout">
      <h5>Why this matters</h5>
      <p>An SMB owner gives you about 12 minutes on a first call. The module trains the first 5 — the ones where you either earn the next 7 or get politely walked out.</p>
    </div>
  </section>
</template>

<template id="screen-2">
  <section class="screen">
    <p class="eyebrow">Screen 2 · The buyer</p>
    <h1 class="screen-title">Meet María — your <em>real</em> buyer</h1>
    <p class="lede">35-employee retail SMB, $4M annual revenue, two physical stores, growing online. María signs every expense report personally because she's been burned twice.</p>

    <h2>What María wakes up worrying about</h2>
    <ul>
      <li><strong>Who spent what.</strong> Last quarter she found a $1 200 charge nobody could explain for two weeks.</li>
      <li><strong>Cash flow visibility.</strong> Her bookkeeper sends a P&amp;L 12 days after month end. By then it's too late to act.</li>
      <li><strong>Bookkeeping drudgery.</strong> She still receives receipt photos on WhatsApp from three employees. She's paying her accountant to re-key them.</li>
    </ul>

    <div class="callout sun">
      <h5>Discovery tactic</h5>
      <p>Don't ask "what's your monthly card spend?" Ask "who's currently approving every expense report, and how long does it take?" The answer tells you whether you're talking to the buyer or to a delegate.</p>
    </div>
  </section>
</template>

<template id="screen-3">
  <section class="screen">
    <p class="eyebrow">Screen 3 · The product</p>
    <h1 class="screen-title">Four value props, mapped to <em>real</em> pain</h1>
    <p class="lede">The product does a lot. In a 12-minute call you can land four things. Pick the one that maps to the pain María named — lead with it, then layer.</p>

    <div class="kv-grid">
      <div class="kv">
        <div class="k">Prop 1</div>
        <div class="v">Real-time spend control</div>
        <div class="desc">See every transaction the moment it clears. Freeze a card from your phone in 2 taps.</div>
      </div>
      <div class="kv">
        <div class="k">Prop 2</div>
        <div class="v">Multi-user cards · per-card limits</div>
        <div class="desc">Issue a card per employee or per project. Set spending caps. Cancel instantly.</div>
      </div>
      <div class="kv">
        <div class="k">Prop 3</div>
        <div class="v">Auto FX at interbank rate</div>
        <div class="desc">Pay foreign suppliers at the same rate the banks use, no markup, no spread surprise.</div>
      </div>
      <div class="kv">
        <div class="k">Prop 4</div>
        <div class="v">Receipt capture + accounting sync</div>
        <div class="desc">Photo a receipt; it auto-matches the transaction; QuickBooks / Xero pulls it pre-coded.</div>
      </div>
    </div>

    <div class="callout">
      <h5>Don't list, match</h5>
      <p>A rep who recites all four props in order loses. A rep who hears "I don't know who spent what" and answers <em>only</em> with Prop 2 — then waits — wins.</p>
    </div>
  </section>
</template>

<template id="screen-4">
  <section class="screen">
    <p class="eyebrow">Screen 4 · Positioning talk track</p>
    <h1 class="screen-title">Match the <em>trigger phrase</em> to the prop</h1>
    <p class="lede">If you hear the phrase on the left, lead with the prop on the right. Tap each row to see the exact opener I use.</p>

    <div class="tt-list">

      <details class="tt">
        <summary><span><span class="label-trigger">trigger</span>"My bookkeeper is drowning in receipts."</span></summary>
        <div class="body">
          <p><strong>Lead with:</strong> Receipt capture + accounting sync.</p>
          <p><strong>Opener:</strong> "How much time does your bookkeeper actually spend re-keying receipts every month? Most of our customers got that down from 6 hours to 30 minutes — let me show you how."</p>
        </div>
      </details>

      <details class="tt">
        <summary><span><span class="label-trigger">trigger</span>"I don't know who's spending what."</span></summary>
        <div class="body">
          <p><strong>Lead with:</strong> Multi-user cards + per-card limits.</p>
          <p><strong>Opener:</strong> "You'd issue one card per employee, set the limit yourself, and see every charge as it happens. If a number looks wrong, you freeze the card in two taps. Want to see what that looks like for, say, your warehouse team?"</p>
        </div>
      </details>

      <details class="tt">
        <summary><span><span class="label-trigger">trigger</span>"We buy inventory abroad and the FX is killing us."</span></summary>
        <div class="body">
          <p><strong>Lead with:</strong> Auto FX at interbank.</p>
          <p><strong>Opener:</strong> "What rate is your bank giving you right now versus the interbank reference? Most SMBs lose 2–4 % per international purchase without knowing. Pull up last month's biggest foreign charge — let me show you the delta."</p>
        </div>
      </details>

      <details class="tt">
        <summary><span><span class="label-trigger">trigger</span>"I had to fire someone for expense fraud."</span></summary>
        <div class="body">
          <p><strong>Lead with:</strong> Real-time spend control + per-card limits.</p>
          <p><strong>Opener:</strong> "That's the worst — both the loss and having to fire someone. Real-time alerts mean you see anomalies the day they happen, not at month end. And caps mean a card can't go past the number you set, ever."</p>
        </div>
      </details>

    </div>

    <div class="callout sun">
      <h5>One trigger, one prop</h5>
      <p>Per Mayer's multimedia principles, don't double up. One trigger heard → one prop demoed → one next-step ask. Then shut up and listen.</p>
    </div>
  </section>
</template>

<template id="screen-5">
  <section class="screen">
    <p class="eyebrow">Screen 5 · Interaction · Objection matching</p>
    <h1 class="screen-title">Match each <em>objection</em> to its best response</h1>
    <p class="lede">Click an objection on the left, then click the response on the right that best fits it. Correct match locks in green.</p>

    <div class="match" id="matchBoard"
         data-pairs='[
           {"id":"o1","obj":"\"We already have a corporate Visa from our bank — why switch?\"","res":"\"You do not have to. Our card sits on top of your existing accounts — keep the bank, get the controls. We are additive, not a switch.\""},
           {"id":"o2","obj":"\"I do not trust new fintechs with my money.\"","res":"\"Funds are held at a regulated tier-1 partner bank, segregated from our balance sheet. Here is the regulator page and our latest audit.\""},
           {"id":"o3","obj":"\"Our accountant will not deal with another tool.\"","res":"\"We export to QuickBooks / Xero with categories pre-coded. Your accountant gets cleaner data, not more work — happy to do a 10-min call with them.\""},
           {"id":"o4","obj":"\"What if your service goes down on payday?\"","res":"\"99.99 % uptime over the last 12 months, status page is public, and we explicitly recommend keeping one bank card as backup. We tell every customer that on day one.\""}
         ]'>
      <div class="match-col" id="matchObjects">
        <h3>Objections</h3>
      </div>
      <div class="match-col" id="matchResponses">
        <h3>Responses</h3>
      </div>
    </div>

    <div class="match-feedback" id="matchFeedback">
      <strong>Done.</strong> All four matched. In a live call you don't recite the response word-for-word — you re-state the objection back in their language first, then deliver the substance. That micro-pause buys trust.
    </div>
  </section>
</template>

<template id="screen-6">
  <section class="screen">
    <p class="eyebrow">Screen 6 · Check · 5 questions</p>
    <h1 class="screen-title">Quick <em>check</em> · pass &gt; 80 %</h1>
    <p class="lede">Five single-choice questions. You can change answers before submitting. Result is reported to the LMS via SCORM 1.2.</p>

    <div class="quiz" id="quiz"
         data-questions='[
           {
             "id":"q1",
             "prompt":"What is the FIRST question you ask an SMB owner exploring corporate cards?",
             "options":[
               "What is your monthly card spend?",
               "Who is currently approving every expense report?",
               "What bank do you use?",
               "How many employees do you have?"
             ],
             "correct":1
           },
           {
             "id":"q2",
             "prompt":"SMB owner says: We already have a corporate Visa from our bank. Your best opener?",
             "options":[
               "Ours has lower fees than your bank.",
               "Switch and we will throw in a free trial.",
               "You do not have to switch — we sit on top, keep the bank, gain the controls.",
               "Trust me, our app is much better."
             ],
             "correct":2
           },
           {
             "id":"q3",
             "prompt":"Which value prop addresses I do not know who spent what?",
             "options":[
               "Auto FX at interbank",
               "Multi-user cards with per-card limits",
               "Receipt capture",
               "Lower foreign-transaction fees"
             ],
             "correct":1
           },
           {
             "id":"q4",
             "prompt":"SMB owner says: I do not trust new fintechs. Best response?",
             "options":[
               "We have been around for 10 years.",
               "Funds are held at a regulated tier-1 partner bank, segregated — here is the regulator page.",
               "Trust us, we are safe.",
               "Let me send you a customer testimonial."
             ],
             "correct":1
           },
           {
             "id":"q5",
             "prompt":"What is the right ending move on a discovery call?",
             "options":[
               "Send pricing by email.",
               "Offer a 30-day free trial.",
               "Book the technical demo with a clear next step and a written agenda.",
               "Hard-close right then."
             ],
             "correct":2
           }
         ]'>
    </div>

    <div class="quiz-summary" id="quizSummary">
      <p class="eyebrow" style="margin:0">Your score</p>
      <div class="big" id="quizBig">—</div>
      <p id="quizMsg">—</p>
    </div>

    <div style="text-align:center; margin-top:24px;">
      <button class="btn btn-primary" id="submitQuiz">Submit answers</button>
    </div>
  </section>
</template>

<script>
(function () {
  var state = {
    screen: 1,
    total: 6,
    quizAnswers: {},
    quizScore: null,
    quizSubmitted: false,
    matchPicked: null,
    matchMatched: {}
  };

  var host = document.getElementById('screenHost');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var progressFill = document.getElementById('progressFill');
  var progressStep = document.getElementById('progressStep');
  var screenLabel = document.getElementById('screenLabel');
  var scormModeEl = document.getElementById('scormMode');

  var labels = ['Welcome', 'The buyer', 'The product', 'Positioning', 'Objections', 'Check'];

  function loadScreen(n) {
    state.screen = n;
    var tmpl = document.getElementById('screen-' + n);
    host.innerHTML = '';
    if (tmpl) host.appendChild(tmpl.content.cloneNode(true));
    progressFill.style.width = (n / state.total * 100).toFixed(1) + '%';
    progressStep.textContent = n + ' / ' + state.total;
    screenLabel.textContent = n + '. ' + (labels[n - 1] || '');
    prevBtn.disabled = n === 1;
    nextBtn.textContent = n < state.total ? 'Next →' : 'Finish';
    nextBtn.disabled = false;
    host.scrollTop = 0;

    if (n === 5) setupMatch();
    if (n === 6) setupQuiz();

    SCORM.setProgress({ screen: n, quizAnswers: state.quizAnswers, matched: state.matchMatched });
  }

  prevBtn.addEventListener('click', function () {
    if (state.screen > 1) loadScreen(state.screen - 1);
  });
  nextBtn.addEventListener('click', function () {
    if (state.screen < state.total) {
      loadScreen(state.screen + 1);
    } else {
      if (state.quizSubmitted) {
        SCORM.setStatus(state.quizScore >= 80 ? 'passed' : 'completed');
        SCORM.finish();
        nextBtn.disabled = true;
        nextBtn.textContent = 'Done ✓';
      } else {
        alert('Please submit the quiz first to complete the module.');
      }
    }
  });

  function setupMatch() {
    var board = document.getElementById('matchBoard');
    if (!board) return;
    var pairs;
    try { pairs = JSON.parse(board.getAttribute('data-pairs')); }
    catch (e) { return; }

    var objCol = document.getElementById('matchObjects');
    var resCol = document.getElementById('matchResponses');
    var resOrder = pairs.slice().sort(function () { return Math.random() - 0.5; });

    pairs.forEach(function (p) {
      var slot = document.createElement('div');
      slot.className = 'match-slot';
      slot.dataset.id = p.id;
      slot.textContent = p.obj;
      if (state.matchMatched[p.id]) {
        slot.classList.add('has-match');
        slot.innerHTML = '<strong>' + escapeHTML(p.obj) + '</strong><br><span style="color:var(--ink-500); font-size:13px;">→ ' + escapeHTML(p.res) + '</span>';
      }
      objCol.appendChild(slot);
    });

    resOrder.forEach(function (p) {
      var item = document.createElement('div');
      item.className = 'match-item';
      item.dataset.id = p.id;
      item.dataset.res = p.res;
      item.textContent = p.res;
      if (state.matchMatched[p.id]) item.classList.add('matched');
      item.addEventListener('click', function () {
        if (item.classList.contains('matched')) return;
        document.querySelectorAll('.match-item').forEach(function (n) { n.classList.remove('dragging'); });
        item.classList.add('dragging');
        state.matchPicked = item;
      });
      resCol.appendChild(item);
    });

    document.querySelectorAll('.match-slot').forEach(function (slot) {
      slot.addEventListener('click', function () {
        if (!state.matchPicked) return;
        var pickedId = state.matchPicked.dataset.id;
        if (pickedId === slot.dataset.id) {
          var resText = state.matchPicked.dataset.res;
          var origObj = pairs.find(function (p) { return p.id === slot.dataset.id; }).obj;
          slot.classList.add('has-match');
          slot.innerHTML = '<strong>' + escapeHTML(origObj) + '</strong><br><span style="color:var(--ink-500); font-size:13px;">→ ' + escapeHTML(resText) + '</span>';
          state.matchPicked.classList.add('matched');
          state.matchPicked.classList.remove('dragging');
          state.matchMatched[pickedId] = true;
          SCORM.recordInteraction(
            Object.keys(state.matchMatched).length + 4,
            'match_' + pickedId,
            'matching',
            resText,
            'correct'
          );
          SCORM.setProgress({ screen: state.screen, quizAnswers: state.quizAnswers, matched: state.matchMatched });
          state.matchPicked = null;
          checkMatchComplete(pairs);
        } else {
          slot.classList.add('over');
          setTimeout(function () { slot.classList.remove('over'); }, 250);
        }
      });
    });
  }

  function checkMatchComplete(pairs) {
    if (Object.keys(state.matchMatched).length === pairs.length) {
      document.getElementById('matchFeedback').classList.add('show');
    }
  }

  function setupQuiz() {
    var quiz = document.getElementById('quiz');
    if (!quiz) return;
    var qs;
    try { qs = JSON.parse(quiz.getAttribute('data-questions')); }
    catch (e) { return; }

    qs.forEach(function (q, qi) {
      var wrap = document.createElement('div');
      wrap.className = 'q';
      wrap.dataset.id = q.id;
      wrap.dataset.correct = q.correct;
      var p = document.createElement('p');
      p.className = 'q-prompt';
      p.innerHTML = '<span class="n">Q' + (qi + 1) + '</span>' + escapeHTML(q.prompt);
      wrap.appendChild(p);
      var opts = document.createElement('div');
      opts.className = 'q-options';
      q.options.forEach(function (opt, oi) {
        var lbl = document.createElement('label');
        lbl.className = 'q-opt';
        lbl.innerHTML = '<input type="radio" name="' + q.id + '" value="' + oi + '"> <span>' + escapeHTML(opt) + '</span>';
        lbl.addEventListener('click', function () {
          state.quizAnswers[q.id] = oi;
          opts.querySelectorAll('.q-opt').forEach(function (n) { n.classList.remove('selected'); });
          lbl.classList.add('selected');
        });
        if (state.quizAnswers[q.id] === oi) lbl.classList.add('selected');
        opts.appendChild(lbl);
      });
      wrap.appendChild(opts);
      quiz.appendChild(wrap);
    });

    document.getElementById('submitQuiz').addEventListener('click', function () {
      var correct = 0;
      qs.forEach(function (q, qi) {
        var wrap = quiz.querySelector('.q[data-id="' + q.id + '"]');
        var picked = state.quizAnswers[q.id];
        var opts = wrap.querySelectorAll('.q-opt');
        opts.forEach(function (n) { n.classList.remove('selected'); });
        if (picked === q.correct) {
          opts[picked].classList.add('correct');
          correct++;
        } else {
          if (picked != null) opts[picked].classList.add('wrong');
          opts[q.correct].classList.add('correct');
        }
        SCORM.recordInteraction(
          qi,
          q.id,
          'choice',
          picked == null ? '' : String(picked),
          picked === q.correct ? 'correct' : 'wrong',
          1
        );
      });
      var score = Math.round(correct / qs.length * 100);
      state.quizScore = score;
      state.quizSubmitted = true;
      SCORM.setScore(score, 0, 100);
      var sum = document.getElementById('quizSummary');
      document.getElementById('quizBig').textContent = score + '%';
      var msg = document.getElementById('quizMsg');
      if (score >= 80) {
        sum.classList.add('show');
        sum.classList.remove('fail');
        msg.textContent = 'Passed. Ready for live calls. Click Finish to close the module.';
      } else {
        sum.classList.add('show');
        sum.classList.add('fail');
        msg.textContent = 'Below 80 %. Re-watch screens 3 and 4, then retake — the talk track is where most points are lost.';
      }
    });
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    SCORM.init({ debug: false });
    scormModeEl.textContent = SCORM.mode;
    scormModeEl.className = 'mode ' + SCORM.mode;
    var saved = SCORM.getProgress();
    if (saved && saved.screen) {
      state.quizAnswers = saved.quizAnswers || {};
      state.matchMatched = saved.matched || {};
      loadScreen(saved.screen);
    } else {
      loadScreen(1);
    }
  });
})();
</script>

</body>
</html>
