<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Module 1 · The Diagnostic Opener · FinTechCard SDR Onboarding</title>
  <meta name="description" content="Open every cold call with a buyer-specific diagnostic — and wait 5 seconds for the silence to fill itself.">

  <!-- Shell styles · tokens, window-manager primitives, per-app skins -->
  <link rel="stylesheet" href="../scorm-shell/styles/shell.css">
  <link rel="stylesheet" href="../scorm-shell/styles/apps.css">
  <!-- Module-specific overlay styles (worked-example annotation, quiz, key-takeaway) -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#desktop">Skip to main content</a>

  <!-- Shell-mounted DOM (mini-OS window manager attaches here) -->
  <div id="mini-os-root">
    <header id="topbar">
      <span class="ftc-logo" aria-label="FinTechCard">FTC</span>
      <span id="module-title">Module 1 · The Diagnostic Opener</span>
      <span id="module-progress" aria-live="polite">0:00 / 10:00</span>
      <button id="help-button" type="button" aria-label="Open help and pinned job aids">Help</button>
    </header>
    <main id="desktop"></main>
    <nav id="taskbar" aria-label="Open applications"><ul id="taskbar-list"></ul></nav>
  </div>

  <!-- Live region for shell announcements (window focus, app open/close) -->
  <div id="focus-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <!--
    Module-stage overlay — modals, the worked-example annotation panel,
    the quiz, the rubric self-score, the key-takeaway card. The shell owns
    the desktop; the module owns the dialog layer that sits over it.
  -->
  <div id="m1-stage" aria-live="polite"></div>

  <script type="module" src="./module.js"></script>
</body>
</html>
