# mario.grasslms.online — static portfolio container
#
# Sits on the same VPS (204.168.165.41) as the GrassLMS stack and
# joins its internal docker network so lms-nginx-1 can reverse-proxy
# by container name (no host port binding, no extra_hosts needed).
#
# Prereq: the lms stack is up, which creates the `lms_internal` network.
#
# Deploy on VPS:
#   cd /opt/mario-portfolio
#   git pull
#   docker compose up -d --build
#
# Health (from any container on lms_internal):
#   docker exec lms-nginx-1 wget -q -O - http://mario-portfolio/healthz

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: mario-portfolio:latest
    container_name: mario-portfolio
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - "no-new-privileges:true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    # Reuse the lms-managed internal network so lms-nginx-1 can resolve
    # `mario-portfolio` by container name.
    external: true
    name: lms_internal
