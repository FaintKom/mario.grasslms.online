# nginx config inside the mario-portfolio container.
# This container sits behind lms-nginx-1 which terminates SSL.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck endpoint used by Docker HEALTHCHECK and lms-nginx upstream check.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Pretty URLs: /block-a → /block-a-lesson-generation.html (handled in upstream nginx if needed).
    # For now, full filenames are used in href attributes.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets aggressively (none yet, but future-proof).
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML files: short cache so iterations land fast.
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Hide nginx version.
    server_tokens off;

    # Basic security headers (upstream lms-nginx may also set these; harmless if duplicated).
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
